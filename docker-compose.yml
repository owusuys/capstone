version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: vtcs
      MYSQL_USER: vtcs
      MYSQL_PASSWORD: vtcs_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "vtcs", "-pvtcs_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
